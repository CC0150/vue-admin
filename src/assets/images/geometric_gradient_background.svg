<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!-- 渐变定义 -->
  <defs>
    <!-- 主背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003973" />
      <stop offset="100%" stop-color="#E5E5BE" />
    </linearGradient>
    
    <!-- 装饰性渐变 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0072CE" />
      <stop offset="100%" stop-color="#00C6CF" />
    </linearGradient>
    
    <!-- 圆形光晕渐变 -->
    <radialGradient id="glowGradient1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.2)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0)" />
    </radialGradient>
    
    <!-- 半透明形状渐变 -->
    <linearGradient id="shapeGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.15)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0)" />
    </linearGradient>
  </defs>
  
  <!-- 主背景 -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- 装饰性圆形 -->
  <circle cx="300" cy="300" r="400" fill="url(#glowGradient1)" />
  <circle cx="1600" cy="700" r="350" fill="url(#glowGradient1)" />
  
  <!-- 装饰性波浪 -->
  <path d="M0,500 Q400,400 800,500 T1600,500 L1920,500 L1920,1080 L0,1080 Z" fill="rgba(255, 255, 255, 0.05)" />
  <path d="M0,600 Q500,500 1000,600 T1800,600 L1920,600 L1920,1080 L0,1080 Z" fill="rgba(255, 255, 255, 0.03)" />
  
  <!-- 左侧几何装饰 -->
  <g transform="translate(100, 200) rotate(-5)">
    <rect x="0" y="0" width="200" height="200" fill="url(#shapeGradient1)" rx="15" ry="15" />
    <rect x="40" y="40" width="120" height="120" fill="url(#accentGradient)" opacity="0.1" rx="10" ry="10" />
    
    <!-- 连接线 -->
    <path d="M0,100 L200,100" stroke="white" stroke-width="2" stroke-opacity="0.1" />
    <path d="M100,0 L100,200" stroke="white" stroke-width="2" stroke-opacity="0.1" />
  </g>
  
  <!-- 右侧几何装饰 -->
  <g transform="translate(1600, 600) rotate(10)">
    <rect x="0" y="0" width="180" height="180" fill="url(#shapeGradient1)" rx="15" ry="15" />
    <rect x="35" y="35" width="110" height="110" fill="url(#accentGradient)" opacity="0.1" rx="10" ry="10" />
    
    <!-- 连接线 -->
    <path d="M0,90 L180,90" stroke="white" stroke-width="2" stroke-opacity="0.1" />
    <path d="M90,0 L90,180" stroke="white" stroke-width="2" stroke-opacity="0.1" />
  </g>
  
  <!-- 中央装饰 -->
  <g transform="translate(900, 400) rotate(0)">
    <circle cx="0" cy="0" r="150" fill="url(#shapeGradient1)" />
    <circle cx="0" cy="0" r="80" fill="url(#accentGradient)" opacity="0.1" />
    
    <!-- 十字线 -->
    <path d="M-100,0 L100,0" stroke="white" stroke-width="2" stroke-opacity="0.1" />
    <path d="M0,-100 L0,100" stroke="white" stroke-width="2" stroke-opacity="0.1" />
  </g>
  
  <!-- 装饰性多边形 -->
  <polygon points="500,200 600,300 400,300" fill="url(#accentGradient)" opacity="0.2" />
  <polygon points="1400,250 1500,350 1300,350" fill="url(#accentGradient)" opacity="0.2" />
  <polygon points="900,700 1000,800 800,800" fill="url(#accentGradient)" opacity="0.2" />
  
  <!-- 装饰性小点 -->
  <g opacity="0.5">
    <circle cx="200" cy="100" r="5" fill="white" />
    <circle cx="250" cy="150" r="4" fill="white" />
    <circle cx="180" cy="200" r="3" fill="white" />
    
    <circle cx="1700" cy="100" r="5" fill="white" />
    <circle cx="1650" cy="150" r="4" fill="white" />
    <circle cx="1720" cy="200" r="3" fill="white" />
    
    <circle cx="1000" cy="200" r="5" fill="white" />
    <circle cx="950" cy="250" r="4" fill="white" />
    <circle cx="1050" cy="280" r="3" fill="white" />
    
    <circle cx="500" cy="700" r="5" fill="white" />
    <circle cx="450" cy="750" r="4" fill="white" />
    <circle cx="550" cy="780" r="3" fill="white" />
    
    <circle cx="1400" cy="700" r="5" fill="white" />
    <circle cx="1350" cy="750" r="4" fill="white" />
    <circle cx="1450" cy="780" r="3" fill="white" />
  </g>
  
  <!-- 水平装饰线条 -->
  <g opacity="0.3">
    <path d="M0,300 L1920,300" stroke="white" stroke-width="1" stroke-opacity="0.2" />
    <path d="M0,400 L1920,400" stroke="white" stroke-width="1" stroke-opacity="0.15" />
    <path d="M0,500 L1920,500" stroke="white" stroke-width="1" stroke-opacity="0.1" />
    <path d="M0,600 L1920,600" stroke="white" stroke-width="1" stroke-opacity="0.05" />
    <path d="M0,700 L1920,700" stroke="white" stroke-width="1" stroke-opacity="0.08" />
  </g>
  
  <!-- 垂直装饰线条 -->
  <g opacity="0.3">
    <path d="M300,0 L300,1080" stroke="white" stroke-width="1" stroke-opacity="0.2" />
    <path d="M600,0 L600,1080" stroke="white" stroke-width="1" stroke-opacity="0.15" />
    <path d="M900,0 L900,1080" stroke="white" stroke-width="1" stroke-opacity="0.1" />
    <path d="M1200,0 L1200,1080" stroke="white" stroke-width="1" stroke-opacity="0.05" />
    <path d="M1500,0 L1500,1080" stroke="white" stroke-width="1" stroke-opacity="0.08" />
  </g>
  
  <!-- 装饰性圆形区域 -->
  <circle cx="400" cy="800" r="100" fill="radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%)" />
  <circle cx="1500" cy="300" r="120" fill="radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%)" />
  
  <!-- 不规则装饰形状 -->
  <path d="M800,100 C900,200 1000,150 1100,250 C1200,350 1300,300 1400,400" stroke="url(#accentGradient)" stroke-width="3" fill="none" stroke-opacity="0.2" />
  <path d="M200,800 C300,900 400,850 500,950 C600,1050 700,1000 800,1100" stroke="url(#accentGradient)" stroke-width="3" fill="none" stroke-opacity="0.2" />
</svg>