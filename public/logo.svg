<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F7DF3"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD"/>
      <stop offset="100%" style="stop-color:#DBEAFE"/>
    </linearGradient>
  </defs>
  <!-- Background: rounded square -->
  <rect x="1" y="1" width="46" height="46" rx="11" fill="url(#bgGrad)"/>
  <!-- Central ring (core system) -->
  <circle cx="24" cy="24" r="6.5" fill="none" stroke="white" stroke-width="3" opacity="0.95"/>
  <!-- Top-right satellite node -->
  <circle cx="35" cy="15" r="4" fill="white" opacity="0.95"/>
  <!-- Bottom-left satellite node -->
  <circle cx="13" cy="33" r="4" fill="white" opacity="0.95"/>
  <!-- Connection: center to top-right -->
  <line x1="24" y1="17.5" x2="32" y2="16.5" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Connection: center to bottom-left -->
  <line x1="17.5" y1="24" x2="15.5" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Small floating data point -->
  <circle cx="37" cy="31" r="2" fill="white" opacity="0.65"/>
  <!-- Subtle inner glow -->
  <circle cx="24" cy="24" r="3" fill="white" opacity="0.25"/>
</svg>
